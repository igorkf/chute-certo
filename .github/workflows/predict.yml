name: Prediction Pipeline

on:
  schedule:
    - cron: "0 5 * * *" # Diariamente às 5h UTC (2h Brasília)
  workflow_dispatch: # Trigger manual via GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest

    env:
      # Secrets
      API_KEY_FOOTBALL_DATA: ${{ secrets.API_KEY_FOOTBALL_DATA }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      # Variables
      TURSO_URL: ${{ vars.TURSO_URL }}
      # Hardcoded (public)
      DAGSHUB_REPO_OWNER: igorkuivjogi
      DAGSHUB_REPO_NAME: chute-certo
      MLFLOW_TRACKING_USERNAME: igorkuivjogi
      MODEL_URI: models:/brasileirao-predictor/latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download latest data
        run: uv run python scripts/download_data.py --seasons 2023 2024 2025 2026

      - name: Evaluate previous round
        run: uv run python scripts/evaluate_round.py 2026

      - name: Train and register model
        run: uv run python scripts/pipeline.py

      - name: Predict upcoming round
        run: uv run python scripts/predict_upcoming.py 2026
